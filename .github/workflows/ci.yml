name: MERN CI/CD Pipeline

on:
  pull_request:
    branches:
      - test
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.13.0'
      - name: Install root dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm run test

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Create dummy .env
        run: |
          cd ..
          echo "MONGO_URI=mongodb://mongodb:27017/reactandnode" > .env
          echo "PORT=5001" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" >> .env
      - name: Build Docker Images
        run: docker compose build

      - name: Start Services
        run: docker compose up -d

      - name: Wait for Health Check
        run: |
          timeout 60s bash -c 'until curl -s http://localhost:5001/api/attributes; do sleep 5; done'

      - name: Run API Smoke Test
        run: |
          RESPONSE=$(curl -s http://localhost:5001/api/attributes)
          if [[ $RESPONSE == *"["* ]]; then
            echo "Success: API returned an array of attributes."
          else
            docker compose logs backend --tail 50
            echo "Failure: API response was unexpected: $RESPONSE"
            exit 1
          fi

      - name: Debug Backend on Failure
        if: failure()
        run: docker compose logs backend

      - name: Shutdown
        if: always()
        run: docker compose down
